<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cleaning Services - VSD Synergy Limited</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-roboto: 'Roboto', sans-serif;
      --font-lato: 'Lato', sans-serif;
      --brand-primary: #3080E8;
      --brand-primary-dark: #1e5fb8;
      --accent-coral: #FF6B35;
      --accent-coral-dark: #E55A2B;
      --neutral-50: #F8FAFC;
      --neutral-100: #F1F5F9;
      --neutral-200: #E2E8F0;
      --neutral-700: #334155;
      --neutral-800: #1E293B;
      --neutral-900: #0F172A;
      --radius-xl: 24px;
      --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    body {
      font-family: var(--font-lato);
      background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-dark) 100%);
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-2xl);
      max-width: 600px;
      margin: 3rem auto;
      padding: 2.5rem;
      text-align: center;
    }
    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: white;
      font-family: var(--font-roboto);
      font-weight: 700;
      border-radius: 16px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(37, 211, 102, 0.4);
    }
    .whatsapp-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(37, 211, 102, 0.5);
    }
    .info-box {
      background: var(--neutral-50);
      border: 1px solid var(--neutral-200);
      border-radius: 16px;
      padding: 1.25rem;
      margin-top: 1.5rem;
      text-align: left;
    }
    .info-box h3 {
      font-family: var(--font-roboto);
      font-weight: 700;
      color: var(--neutral-800);
      margin-bottom: 0.5rem;
    }
    .info-box p {
      color: var(--neutral-700);
      font-size: 0.9375rem;
      line-height: 1.6;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.8);
      font-size: 0.875rem;
      text-decoration: none;
      margin-bottom: 1rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: white; }
    @media (max-width: 640px) {
      .card { margin: 1rem auto; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to Home
  </a>

  <div class="card">
    <h1 class="text-2xl font-bold mb-2" style="font-family: var(--font-roboto); color: var(--neutral-900);">Cleaning Services</h1>
    <p class="mb-6" style="color: var(--neutral-700); line-height: 1.6;">
      Send us a message here to get a quote for our cleaning services
    </p>

    <a id="whatsappLink" href="#" class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.72 1.46h.004c6.552 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Chat on WhatsApp
    </a>

    <div class="info-box">
      <h3>How it works</h3>
      <p>
        Send us a WhatsApp message with a <strong>video</strong> of the house or office you want cleaned.
        Our customer support team will review it and send you a personalised quote right away.
      </p>
    </div>
  </div>

  <script>
    // Replace this with your actual WhatsApp number/link when ready
    const WHATSAPP_NUMBER = '447774546517';
    const message = encodeURIComponent('Hi VSD Synergy, I would like to get a quote for cleaning services. I have attached a video of the space.');
    document.getElementById('whatsappLink').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
  </script>
</body>
</html>
