<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled - VSD Synergy Limited</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-primary: #3080E8;
      --brand-primary-dark: #1e5fb8;
      --accent-coral: #FF6B35;
    }
    body { font-family: 'Lato', sans-serif; }
    .font-roboto { font-family: 'Roboto', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-100 px-4">
  <div class="max-w-md w-full text-center">
    <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12">
      <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-yellow-100 flex items-center justify-center">
        <svg class="w-10 h-10 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="font-roboto text-2xl font-bold text-gray-800 mb-3">Payment Cancelled</h1>
      <p class="text-gray-600 mb-6 leading-relaxed">
        Your quote has been saved but payment was not completed. You can return to your quote anytime to finish the payment.
      </p>
      <div class="flex flex-col gap-3">
        <a href="/quote/removal" class="inline-block w-full py-3 px-6 bg-gradient-to-r from-[var(--brand-primary)] to-[var(--brand-primary-dark)] text-white font-bold rounded-lg hover:opacity-90 transition-opacity">
          Back to Removal Quote
        </a>
        <a href="/quote/cleaning" class="inline-block w-full py-3 px-6 bg-gradient-to-r from-[var(--accent-coral)] to-[#E55A2B] text-white font-bold rounded-lg hover:opacity-90 transition-opacity">
          Back to Cleaning Quote
        </a>
      </div>
    </div>
  </div>
</body>
</html>
